<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katana Migration</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="container nav-inner">
    <a class="brand" href="index.html">⚔️ Katana</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="migration.html">Migration</a>
      <a href="glory-wars.html">Glory Wars</a>
      <a href="tutorials.html">Guides</a>
      <a href="discord.html">Discord</a>
    </nav>
  </div>
</header>

<main>
  <section class="section">
    <div class="container">

      <h1>Migration Application</h1>
      <p>Fill out your details to apply for Katana.</p>

      <form 
        class="panel command-card form-grid"
        action="https://script.google.com/macros/s/AKfycbwo5AIHu68Fn4Yp5EuqtyX8A9ENmbyyhukRE-VAWTf7z0DJr9EjZ3HsMMBUHjEpHd4pMQ/exec"
        method="POST"
        target="hidden_iframe"
        onsubmit="return lockForm(this);"
      >

        <input type="text" name="player_name" placeholder="Player Name" required>
        <input type="text" name="discord_contact" placeholder="Discord / Contact" required>
        <input type="text" name="current_server" placeholder="Current Server" required>
        <input type="text" name="current_alliance" placeholder="Current Alliance">

        <input type="text" name="kill_ranking" placeholder="Kill Ranking">
        
        <select name="preferred_alliance" required>
          <option value="">Preferred Alliance</option>
          <option>Katana</option>
          <option>AOE</option>
          <option>ERES</option>
          <option>FAM4</option>
        </select>

        <input type="number" name="total_power" placeholder="Total Power (M)">
        <input type="number" name="hero_power" placeholder="Hero Power (M)">
        <input type="number" name="hq_level" placeholder="HQ Level">

        <select name="ar_research">
          <option value="">AR Research</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <select name="t10s">
          <option value="">T10s</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <select name="unit_training">
          <option value="">Unit Training %</option>
          <option>1-10%</option>
          <option>11-20%</option>
          <option>21-30%</option>
          <option>31-40%</option>
          <option>41-50%</option>
        </select>

        <textarea name="notes" placeholder="Notes / Playstyle"></textarea>

        <button type="submit" class="btn primary full">
          Submit Migration Request
        </button>

      </form>

    </div>
  </section>
</main>

<footer>
  <div class="container footer-inner">
    <strong>⚔️ Katana Alliance</strong>
    <span>Built for migration, war coordination, guides, and community updates.</span>
  </div>
</footer>

<!-- Hidden iframe (prevents Google redirect page) -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
let formAlreadySubmitted = false;

function lockForm(form) {
  if (formAlreadySubmitted) {
    return false;
  }

  formAlreadySubmitted = true;

  const button = form.querySelector('button[type="submit"]');

  if (button) {
    button.disabled = true;
    button.innerText = "Submitting...";
    button.style.opacity = "0.6";
    button.style.cursor = "not-allowed";
  }

  form.style.pointerEvents = "none";

  setTimeout(function () {
    window.location.href = "thankyou.html";
  }, 2000);

  return true;
}
</script>

</body>
</html>
