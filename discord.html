<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect With Us</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #000000 60%);
      color: white;
    }

    .wrapper {
      max-width: 900px;
      margin: auto;
      padding: 50px 20px;
    }

    .back {
      display: inline-block;
      margin-bottom: 25px;
      color: #67e8f9;
      text-decoration: none;
      border: 1px solid rgba(34,211,238,0.3);
      padding: 10px 16px;
      border-radius: 999px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 40px;
    }

    p {
      color: #dbe4ee;
      line-height: 1.7;
      font-size: 17px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      padding: 16px 28px;
      border-radius: 16px;
      background: rgba(34, 211, 238, 0.14);
      border: 1px solid rgba(34, 211, 238, 0.3);
      color: #67e8f9;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <a class="back" href="index.html">← Back to Home</a>

    <div class="card">
      <h1>Connect With Us</h1>
      <p>Join our Discord to talk with leadership, ask questions, and coordinate migration.</p>

      <a class="btn" href="https://discord.gg/YOUR-LINK-HERE" target="_blank">Join Our Discord</a>
    </div>
  </div>
</body>
</html>
