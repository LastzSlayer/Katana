<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home to Katana</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #000000 60%);
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 40px;
      font-size: 18px;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      max-width: 700px;
      margin: 0 auto;
    }

    .links a {
      text-decoration: none;
      text-align: center;
      padding: 24px;
      border-radius: 18px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.25);
      color: #67e8f9;
      font-weight: bold;
      font-size: 22px;
      transition: 0.2s ease;
    }

    .links a:hover {
      transform: scale(1.02);
      background: rgba(34, 211, 238, 0.16);
    }

    @media (max-width: 700px) {
      .links {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ Home to Katana ⚔️</h1>
    <p class="subtitle">Choose where you want to go</p>

    <div class="links">
      <a href="migration.html">Migration</a>
      <a href="glory-wars.html">Glory Wars</a>
      <a href="tutorials.html">Tutorials & Guides</a>
      <a href="discord.html">Connect With Us</a>
    </div>
  </div>
</body>
</html>
